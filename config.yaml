    font-size: 16
    font-family: sans
    page-content-width-factor: 48
    page-i18n-padding: 0
    font-size-h1: 1.8
    font-size-h2: 1.6
    font-size-h3: 1.4
    font-size-h4: 1.2

    # Light theme — base colors (intent hues adjusted by compute-colors for contrast)
