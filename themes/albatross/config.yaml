---
baseURL: /
title: Albatross theme - Elis Hirwing
defaultContentLanguage: sv
theme: albatross

# Style code highlights with classes rather than inline styles.
markup:
  highlight:
    noClasses: false

params:
  copyrightOwner: 2022 Elis Hirwing

  # Extra head content to render within the <head> tag
  extraHeadContent: ''

  # Extra header content to render within the <header> tag before the menu
  extraHeaderContent: ''

  # Dark and light logo paths as well as icon path
  darkLogoPath: /img/albatross_logo.png
  lightLogoPath: /img/albatross_logo.png

  # Favicon logo, if set to false, it's hidden
  iconPath: /img/albatross_icon.png

  # Show logo at top
  showLogo: true

  # Site wide open graph image to use for sharing
  ogImagePath: /img/albatross_logo.png

  # Language code to flag name mapping for the language switcher
  languageCode2FlagName:
    sv-se: 'se'
    en-gb: 'gb'

  # Edit these base colors, then run: just compute-colors themes/albatross/config.yaml
  colors:
    # Typography
    font-size: 18
    font-family: sans
    page-content-width-factor: 42
    page-i18n-padding: 0
    font-size-h1: 1.8
    font-size-h2: 1.6
    font-size-h3: 1.4
    font-size-h4: 1.2

    # Light theme — base colors (intent hues adjusted by compute-colors for contrast)
    light-background-color: '#FBF9FA'  # Seasalt
    light-border-color: '#000000'  # Black
    light-link-intent: '#0000EE'  # Blue
    light-link-visited-intent: '#551A8B'  # Purple
    light-menu-background: '#E5E6EC'  # Anti-flash white

    # Dark theme — base colors
    dark-background-color: '#2A2C31'  # Jet
    dark-border-color: '#000000'  # Black
    dark-link-intent: '#0000EE'  # Blue
    dark-link-visited-intent: '#551A8B'  # Purple
    dark-menu-background: '#27373F'  # Gunmetal

    # Code highlight colors (Monokai)
    code-background-color: '#272822'
    code-foreground-color: '#f8f8f2'
    code-chroma-bg: '#272822'
    code-chroma-fg: '#f8f8f2'
    code-chroma-dark-red-fg: '#960050'
    code-chroma-dark-red-bg: '#1e0010'
    code-chroma-dark-gray-fg: '#3c3d38'
    code-chroma-light-gray-fg: '#7f7f7f'
    code-chroma-light-blue-fg: '#66d9ef'
    code-chroma-red-fg: '#f92672'
    code-chroma-green-fg: '#a6e22e'
    code-chroma-purple-fg: '#ae81ff'
    code-chroma-yellow-fg: '#e6db74'
    code-chroma-medium-gray-fg: '#75715e'

  # Auto-generated by: just compute-colors themes/albatross/config.yaml (do not edit manually)
  style:
    font-size: 18
    font-family: sans
    page-content-width-factor: 42
    page-i18n-padding: 0
    font-size-h1: 1.8
    font-size-h2: 1.6
    font-size-h3: 1.4
    font-size-h4: 1.2
    light-background-color: '#FBF9FA'
    light-border-color: '#000000'
    light-menu-background: '#E5E6EC'
    light-foreground-color: '#555555'
    light-link-default-color: '#2828FF'
    light-link-visited-color: '#7724C2'
    light-menu-foreground: '#0000FA'
    light-menu-item-hover-background: '#D6D8E1'
    light-menu-item-hover-foreground: '#424242'
    light-tag-background-color: '#E7DAE0'
    dark-background-color: '#2A2C31'
    dark-border-color: '#000000'
    dark-menu-background: '#27373F'
    dark-foreground-color: '#B8B8B8'
    dark-link-default-color: '#B0B0FF'
    dark-link-visited-color: '#CDA9EF'
    dark-menu-foreground: '#BDBDFF'
    dark-menu-item-hover-background: '#31454F'
    dark-menu-item-hover-foreground: '#D9D9D9'
    dark-tag-background-color: '#42454C'
